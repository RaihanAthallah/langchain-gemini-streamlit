services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: faq_pgvector
    restart: unless-stopped
    environment:
      POSTGRES_DB: faq_agent
      POSTGRES_USER: faq_user
      POSTGRES_PASSWORD: faq_password
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U faq_user -d faq_agent"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:latest
    container_name: faq_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build: .
    container_name: faq_app
    restart: unless-stopped
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
    volumes:
      - ./base-knowledge:/app/base-knowledge
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg_data:
